        apps.forEachIndexed { index, app ->
            TopAppItem(
                app = app,
                position = index + 1,
                onClick = { onAppClick(app) }
            )
            if (index < apps.lastIndex) {
                Divider(
                    modifier = Modifier.padding(start = 72.dp),
                    color = Color.LightGray.copy(alpha = 0.5f)
                )
            }
        }
    }
}


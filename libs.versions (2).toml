// ==================== MAIN APP COMPOSABLE ====================
@Composable
fun PlayStoreApp() {
    var selectedTab by remember { mutableStateOf(0) }
    var selectedApp by remember { mutableStateOf<App?>(null) }
    var searchQuery by remember { mutableStateOf("") }
    var showSearch by remember { mutableStateOf(false) }

    Scaffold(
        bottomBar = {
            if (selectedApp == null) {
                BottomNavigationBar(
                    selectedTab = selectedTab,
                    onTabSelected = { selectedTab = it }
                )
            }
        }
    ) { paddingValues ->
        Box(modifier = Modifier.padding(paddingValues)) {
            AnimatedContent(
                targetState = selectedApp,
                transitionSpec = {
                    slideInHorizontally { it } togetherWith slideOutHorizontally { -it }
                }
            ) { app ->
                if (app != null) {
                    AppDetailScreen(
                        app = app,
                        onBackClick = { selectedApp = null }
                    )
                } else {
                    when (selectedTab) {
                        0 -> GamesScreen(
                            showSearch = showSearch,
                            searchQuery = searchQuery,
                            onSearchQueryChange = { searchQuery = it },
                            onSearchToggle = { showSearch = !showSearch },
                            onAppClick = { selectedApp = it }
                        )
                        1 -> AppsScreen(
                            showSearch = showSearch,
                            searchQuery = searchQuery,
                            onSearchQueryChange = { searchQuery = it },
                            onSearchToggle = { showSearch = !showSearch },
                            onAppClick = { selectedApp = it }
                        )
                        2 -> BooksScreen()
                        3 -> ProfileScreen()
                    }
                }
            }
        }
    }
}

// ==================== BOTTOM NAVIGATION ====================
@Composable
fun BottomNavigationBar(
    selectedTab: Int,
    onTabSelected: (Int) -> Unit
) {
    NavigationBar(
        containerColor = Color.White,
        tonalElevation = 8.dp
    ) {
        NavigationBarItem(
            icon = { Icon(Icons.Filled.SportsEsports, contentDescription = "Игры") },
            label = { Text("Игры") },
            selected = selectedTab == 0,
            onClick = { onTabSelected(0) },
            colors = NavigationBarItemDefaults.colors(
                selectedIconColor = Color(0xFF01875F),
                selectedTextColor = Color(0xFF01875F)
            )
        )
        NavigationBarItem(
            icon = { Icon(Icons.Filled.Apps, contentDescription = "Приложения") },
            label = { Text("Приложения") },
            selected = selectedTab == 1,
            onClick = { onTabSelected(1) },
            colors = NavigationBarItemDefaults.colors(
                selectedIconColor = Color(0xFF01875F),
                selectedTextColor = Color(0xFF01875F)
            )
        )
        NavigationBarItem(
            icon = { Icon(Icons.Filled.Book, contentDescription = "Книги") },
            label = { Text("Книги") },
            selected = selectedTab == 2,
            onClick = { onTabSelected(2) },
            colors = NavigationBarItemDefaults.colors(
                selectedIconColor = Color(0xFF01875F),
                selectedTextColor = Color(0xFF01875F)
            )
        )
        NavigationBarItem(
            icon = { Icon(Icons.Filled.Person, contentDescription = "Профиль") },
            label = { Text("Профиль") },
            selected = selectedTab == 3,
            onClick = { onTabSelected(3) },
            colors = NavigationBarItemDefaults.colors(
                selectedIconColor = Color(0xFF01875F),
                selectedTextColor = Color(0xFF01875F)
            )
        )
    }
}

// ==================== TOP APP BAR ====================
@OptIn(ExperimentalMaterial3Api::class)
@Composable
fun PlayStoreTopBar(
    showSearch: Boolean,
    searchQuery: String,
    onSearchQueryChange: (String) -> Unit,
    onSearchToggle: () -> Unit
) {
    TopAppBar(
        title = {
            if (showSearch) {
                OutlinedTextField(
                    value = searchQuery,
                    onValueChange = onSearchQueryChange,
                    placeholder = { Text("Поиск приложений и игр") },
                    modifier = Modifier.fillMaxWidth(),
                    singleLine = true,
                    colors = OutlinedTextFieldDefaults.colors(
                        focusedBorderColor = Color(0xFF01875F),
                        cursorColor = Color(0xFF01875F)
                    )
                )
            } else {
                Row(verticalAlignment = Alignment.CenterVertically) {
                    Icon(
                        Icons.Filled.PlayArrow,
                        contentDescription = null,
                        tint = Color(0xFF01875F),
                        modifier = Modifier.size(32.dp)
                    )
                    Spacer(modifier = Modifier.width(8.dp))
                    Text(
                        "Google Play",
                        fontWeight = FontWeight.Medium,
                        fontSize = 20.sp
                    )
                }
            }
        },
        actions = {
            IconButton(onClick = onSearchToggle) {
                Icon(
                    if (showSearch) Icons.Filled.Close else Icons.Filled.Search,
                    contentDescription = "Поиск"
                )
            }
            if (!showSearch) {
                IconButton(onClick = { }) {
                    Icon(Icons.Filled.Notifications, contentDescription = "Уведомления")
                }
                IconButton(onClick = { }) {
                    Box(
                        modifier = Modifier
                            .size(32.dp)
                            .clip(CircleShape)
                            .background(Color(0xFF01875F)),
                        contentAlignment = Alignment.Center
                    ) {
                        Text("U", color = Color.White, fontWeight = FontWeight.Bold)
                    }
                }
            }
        },
        colors = TopAppBarDefaults.topAppBarColors(
            containerColor = Color.White
        )
    )
}

// ==================== GAMES SCREEN ====================
@Composable
fun GamesScreen(
    showSearch: Boolean,
    searchQuery: String,
    onSearchQueryChange: (String) -> Unit,
    onSearchToggle: () -> Unit,
    onAppClick: (App) -> Unit
) {
    Column {
        PlayStoreTopBar(
            showSearch = showSearch,
            searchQuery = searchQuery,
            onSearchQueryChange = onSearchQueryChange,
            onSearchToggle = onSearchToggle
        )

        LazyColumn(
            modifier = Modifier.fillMaxSize()
        ) {
            // Категории
            item {
                CategoryChips()
            }

            // Баннер
            item {
                PromoBanner()
            }

            // Рекомендуемые
            item {
                SectionHeader("Рекомендуем для вас")
                HorizontalAppList(
                    apps = SampleData.apps.filter {
                        searchQuery.isEmpty() || it.name.contains(searchQuery, ignoreCase = true)
                    },
                    onAppClick = onAppClick
                )
            }

            // Топ игр
            item {
                SectionHeader("Топ бесплатных игр")
                TopAppsList(
                    apps = SampleData.apps.take(5).filter {
                        searchQuery.isEmpty() || it.name.contains(searchQuery, ignoreCase = true)
                    },
                    onAppClick = onAppClick
                )
            }

            // Новые
            item {
                SectionHeader("Новинки")
                HorizontalAppList(
                    apps = SampleData.apps.reversed().filter {
                        searchQuery.isEmpty() || it.name.contains(searchQuery, ignoreCase = true)
                    },
                    onAppClick = onAppClick
                )
                Spacer(modifier = Modifier.height(16.dp))
            }
        }
    }
}

// ==================== APPS SCREEN ====================
@Composable
fun AppsScreen(
    showSearch: Boolean,
    searchQuery: String,
    onSearchQueryChange: (String) -> Unit,
    onSearchToggle: () -> Unit,
    onAppClick: (App) -> Unit
) {
    Column {
        PlayStoreTopBar(
            showSearch = showSearch,
            searchQuery = searchQuery,
            onSearchQueryChange = onSearchQueryChange,
            onSearchToggle = onSearchToggle
        )

        LazyColumn(
            modifier = Modifier.fillMaxSize()
        ) {
            item {
                CategoryChips()
            }

            item {
                SectionHeader("Лучшие приложения")
                HorizontalAppList(
                    apps = SampleData.apps.filter {
                        searchQuery.isEmpty() || it.name.contains(searchQuery, ignoreCase = true)
                    },
                    onAppClick = onAppClick
                )
            }

            item {
                SectionHeader("Топ бесплатных приложений")
                TopAppsList(
                    apps = SampleData.apps.filter {
                        searchQuery.isEmpty() || it.name.contains(searchQuery, ignoreCase = true)
                    },
                    onAppClick = onAppClick
                )
            }

            item {
                SectionHeader("Выбор редакции")
                HorizontalAppList(
                    apps = SampleData.apps.shuffled().filter {
                        searchQuery.isEmpty() || it.name.contains(searchQuery, ignoreCase = true)
                    },
                    onAppClick = onAppClick
                )
                Spacer(modifier = Modifier.height(16.dp))
            }
        }
    }
}

// ==================== CATEGORY CHIPS ====================
@Composable
fun CategoryChips() {
    var selectedCategory by remember { mutableStateOf(0) }

    LazyRow(
        contentPadding = PaddingValues(horizontal = 16.dp, vertical = 8.dp),
        horizontalArrangement = Arrangement.spacedBy(8.dp)
    ) {
        itemsIndexed(SampleData.categories) { index, category ->
            FilterChip(
                onClick = { selectedCategory = index },
                label = {
                    Row(verticalAlignment = Alignment.CenterVertically) {
                        Icon(
                            category.icon,
                            contentDescription = null,
                            modifier = Modifier.size(18.dp)
                        )
                        Spacer(modifier = Modifier.width(4.dp))
                        Text(category.name)
                    }
                },
                selected = selectedCategory == index,
                colors = FilterChipDefaults.filterChipColors(
                    selectedContainerColor = Color(0xFFE8F5E9),
                    selectedLabelColor = Color(0xFF01875F)
                )
            )
        }
    }
}

